<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador | Agora Filosófica</title>
<meta name="description" content="Comparador de filósofos para estudiar similitudes, diferencias, obras y conceptos clave.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
>
<link rel="stylesheet" href="estilos.css">
</head>
<body>
<div class="page-shell">
    <header class="site-header">
        <a class="brand" href="index.html#inicio" aria-label="Volver al inicio">
            <span class="brand-mark">
                <img src="assets/filosofia-digital-logo.png" alt="Filosofía Digital">
            </span>
            <div>
                <p class="brand-overline">Portal de estudio</p>
                <h1>Agora Filosófica</h1>
            </div>
        </a>

        <nav class="site-nav" aria-label="Navegación secundaria">
            <a href="index.html#filosofos">Filósofos</a>
            <a href="quiz.html">Test interactivo</a>
            <a href="index.html#biblioteca">Biblioteca</a>
            <a href="index.html#ruta">Ruta</a>
        </nav>

        <div class="toolbar">
            <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Cambiar modo oscuro">
                <span aria-hidden="true">◐</span>
            </button>
        </div>
    </header>

    <main>
        <section class="section-block compare-shell">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Comparador</p>
                    <h2>Contrasta filósofos sin perder el hilo</h2>
                </div>
                <p>Elige dos autores y revisa diferencias de contexto, método, conceptos, obras e influencia.</p>
            </div>
            <div class="compare-controls">
                <label>
                    <span>Primer filósofo</span>
                    <select id="compare-a"></select>
                </label>
                <label>
                    <span>Segundo filósofo</span>
                    <select id="compare-b"></select>
                </label>
            </div>
            <div id="compare-output"></div>
        </section>
    </main>
</div>

<script src="philosophy-data.js?v=2"></script>
<script src="philosophy-enhancements.js?v=1"></script>
<script src="comparador.js?v=1"></script>
</body>
</html>
