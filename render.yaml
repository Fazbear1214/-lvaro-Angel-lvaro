services:
  - type: web
    name: agora-filosofica
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.5-flash
      - key: ALLOWED_ORIGIN
        sync: false
